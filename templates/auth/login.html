<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 黄金ETF技术分析系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ==================== Reset & Base ==================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #050810;
            --bg-card: rgba(10, 15, 30, 0.85);
            --border-color: rgba(102, 126, 234, 0.2);
            --border-active: rgba(0, 242, 255, 0.6);
            --text-primary: #e8eaf6;
            --text-secondary: #7986cb;
            --text-muted: #3d4466;
            --accent-cyan: #00f2ff;
            --accent-purple: #667eea;
            --accent-pink: #f72585;
            --glow-cyan: rgba(0, 242, 255, 0.15);
            --glow-purple: rgba(102, 126, 234, 0.15);
            --error-color: #ff5370;
            --success-color: #00f2ff;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==================== Background Canvas ==================== */
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* ==================== Ambient Glow Orbs ==================== */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
        }
        .glow-1 {
            width: 500px; height: 500px;
            top: -100px; right: -100px;
            background: radial-gradient(circle, rgba(0,242,255,0.08) 0%, transparent 70%);
            animation: drift1 12s ease-in-out infinite alternate;
        }
        .glow-2 {
            width: 600px; height: 600px;
            bottom: -150px; left: -100px;
            background: radial-gradient(circle, rgba(102,126,234,0.1) 0%, transparent 70%);
            animation: drift2 15s ease-in-out infinite alternate;
        }
        @keyframes drift1 { from { transform: translate(0, 0) scale(1); } to { transform: translate(-60px, 40px) scale(1.1); } }
        @keyframes drift2 { from { transform: translate(0, 0) scale(1); } to { transform: translate(50px, -30px) scale(1.05); } }

        /* ==================== Auth Wrapper ==================== */
        .auth-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        /* ==================== Auth Card ==================== */
        .auth-card {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 36px 40px 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 0 40px rgba(0, 242, 255, 0.05),
                0 25px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255,255,255,0.05);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==================== Auth Header ==================== */
        .auth-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            filter: drop-shadow(0 0 12px rgba(0,242,255,0.4));
            animation: logoPulse 4s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 12px rgba(0,242,255,0.4)); }
            50% { filter: drop-shadow(0 0 20px rgba(0,242,255,0.6)); }
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-top: 2px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 20px;
            background: rgba(0, 242, 255, 0.05);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #00f2ff;
            box-shadow: 0 0 8px #00f2ff;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-text {
            font-size: 11px;
            color: var(--accent-cyan);
            letter-spacing: 1px;
        }

        /* ==================== Divider ==================== */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
        }

        .divider-text {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ==================== Form ==================== */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            cursor: pointer;
        }

        .label-icon {
            width: 16px;
            height: 16px;
            color: var(--accent-purple);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 48px 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            letter-spacing: 1px;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .input-wrapper input:focus {
            border-color: var(--border-active);
            background: rgba(0, 242, 255, 0.03);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1), inset 0 0 20px rgba(0, 242, 255, 0.03);
        }

        .input-line {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 2px;
            transform: translateX(-50%);
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .input-wrapper input:focus ~ .input-line {
            width: 100%;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .toggle-password:hover { color: var(--text-secondary); }

        .toggle-password svg {
            width: 18px;
            height: 18px;
            display: block;
        }

        .toggle-password .eye-closed { display: none; }
        .toggle-password.show .eye-open { display: none; }
        .toggle-password.show .eye-closed { display: block; }

        /* ==================== Form Options ==================== */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: -4px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            user-select: none;
        }

        .remember-me input[type="checkbox"] {
            display: none;
        }

        .checkmark {
            width: 16px;
            height: 16px;
            border: 1px solid rgba(102, 126, 234, 0.4);
            border-radius: 4px;
            position: relative;
            transition: border-color 0.2s, background 0.2s;
        }

        .remember-me input:checked ~ .checkmark {
            border-color: var(--accent-cyan);
            background: rgba(0, 242, 255, 0.1);
        }

        .remember-me input:checked ~ .checkmark::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 5px;
            height: 9px;
            border: 2px solid var(--accent-cyan);
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }

        .forgot-link {
            font-size: 13px;
            color: var(--accent-purple);
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }

        .forgot-link:hover { color: var(--accent-cyan); }

        /* ==================== Error Message ==================== */
        .error-msg {
            font-size: 13px;
            color: var(--error-color);
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(255, 83, 112, 0.08);
            border: 1px solid rgba(255, 83, 112, 0.2);
            display: none;
            align-items: center;
            gap: 8px;
            animation: shake 0.4s ease;
        }

        .error-msg.show { display: flex; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* ==================== Submit Button ==================== */
        .btn-submit {
            width: 100%;
            padding: 15px 24px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(0,242,255,0.15) 0%, rgba(102,126,234,0.15) 100%);
            border: 1px solid rgba(0,242,255,0.3);
            color: var(--accent-cyan);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,242,255,0.15), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover::before { left: 100%; }

        .btn-submit:hover {
            background: linear-gradient(135deg, rgba(0,242,255,0.25) 0%, rgba(102,126,234,0.25) 100%);
            border-color: rgba(0,242,255,0.6);
            box-shadow: 0 0 30px rgba(0,242,255,0.15), 0 10px 40px rgba(0,0,0,0.3);
            transform: translateY(-1px);
        }

        .btn-submit:active { transform: translateY(0); }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit:disabled::before { display: none; }

        .btn-arrow {
            width: 18px;
            height: 18px;
            transition: transform 0.3s;
        }

        .btn-submit:hover .btn-arrow { transform: translateX(4px); }

        .btn-loading {
            display: none;
            align-items: center;
            gap: 8px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,242,255,0.3);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-submit.loading .btn-text { display: none; }
        .btn-submit.loading .btn-arrow { display: none; }
        .btn-submit.loading .btn-loading { display: flex; }

        /* ==================== Footer ==================== */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .auth-footer a {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .auth-footer a:hover { color: var(--accent-cyan); }

        /* ==================== System Info ==================== */
        .system-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
            animation: fadeIn 1s ease 0.5s both;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .sys-version {
            padding: 2px 8px;
            border: 1px solid rgba(102,126,234,0.2);
            border-radius: 10px;
            font-size: 10px;
        }

        /* ==================== Responsive ==================== */
        @media (max-width: 500px) {
            .auth-card { padding: 28px 24px 24px; }
            .logo-icon { width: 36px; height: 36px; }
            .logo-title { font-size: 14px; }
            .status-indicator { display: none; }
        }
    </style>

    <script>
        // ==================== Particle Background ====================
        (function initCanvas() {
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');
            let W, H, particles;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H;
                    this.size = Math.random() * 1.5 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4;
                    this.opacity = Math.random() * 0.5 + 0.1;
                    this.color = Math.random() > 0.5 ? '0,242,255' : '102,126,234';
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color},${this.opacity})`;
                    ctx.fill();
                }
            }

            function init() {
                resize();
                const count = Math.min(Math.floor((W * H) / 8000), 120);
                particles = Array.from({ length: count }, () => new Particle());
            }

            function drawLines() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            const opacity = (1 - dist / 120) * 0.15;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(102,126,234,${opacity})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, W, H);
                particles.forEach(p => { p.update(); p.draw(); });
                drawLines();
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => { init(); });
            init();
            animate();
        })();

        // ==================== Toggle Password Visibility ====================
        const toggleBtn = document.getElementById('togglePwd');
        const pwdInput = document.getElementById('password');

        toggleBtn.addEventListener('click', () => {
            const isPassword = pwdInput.type === 'password';
            pwdInput.type = isPassword ? 'text' : 'password';
            toggleBtn.classList.toggle('show', isPassword);
        });

        // ==================== Form Submission ====================
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.remove('show');
            errorMsg.innerHTML = '';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await resp.json();

                if (data.success) {
                    // Login success animation
                    submitBtn.querySelector('.btn-text').textContent = '登录成功';
                    submitBtn.style.background = 'linear-gradient(135deg, rgba(0,242,255,0.3) 0%, rgba(102,126,234,0.3) 100%)';
                    submitBtn.style.color = '#00f2ff';
                    await new Promise(r => setTimeout(r, 600));
                    window.location.href = '/';
                } else {
                    showError(data.error || '登录失败，请检查用户名和密码');
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            } catch (err) {
                showError('网络连接失败，请检查网络后重试');
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        function showError(msg) {
            errorMsg.innerHTML = `<svg style="width:14px;height:14px;flex-shrink:0" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#ff5370" stroke-width="1.5"/><path d="M10 6v5M10 13.5v.5" stroke="#ff5370" stroke-width="1.5" stroke-linecap="round"/></svg>${msg}`;
            errorMsg.classList.add('show');
        }
    </script>
</body>
</html>
